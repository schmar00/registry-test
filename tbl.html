<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>INSPIRE-AT Codelist - View</title>
</head>

<body>
    <div id="heading"></div>
    <div id="table"></div>

    <script>
        let query = `PREFIX skos:<http://www.w3.org/2004/02/skos/core#>
        PREFIX dcterms:<http://purl.org/dc/terms/>
        select distinct ?URI ?Label
        (GROUP_CONCAT(distinct ?n; separator = '; ') as ?Notation)
        (GROUP_CONCAT(distinct ?D; separator = '; ') as ?Definition)
        (GROUP_CONCAT(distinct ?P; separator = '; ') as ?Parents)
        (GROUP_CONCAT(distinct ?N; separator = '; ') as ?scopeNote)
        (COALESCE(?Lskos, ?Ldcterms, strafter(str(<§>),'https://registry.inspire.gv.at/')) as ?title)
        where { GRAPH ?g {
        {<§> skos:hasTopConcept ?tc . ?tc skos:narrower* ?URI }
        UNION {<§> skos:narrower* ?URI }
        ?URI skos:prefLabel ?Label filter(lang(?Label)="de")
        optional {?URI skos:notation ?n}
        optional {?URI skos:definition ?D filter(lang(?D)="de")}
        optional {?URI skos:scopeNote ?N filter(lang(?N)="de")}
        optional {?URI skos:broader ?o . ?o skos:prefLabel ?P filter(lang(?P)="de")}
        optional {<§> skos:prefLabel ?Lskos filter(lang(?Lskos)="de")}
        optional {<§> dcterms:title ?Ldcterms filter(lang(?Ldcterms)="de")}
        }}
        group by ?URI ?Label ?title ?Lskos ?Ldcterms
        order by ?Label`;

        let urlParams = new URLSearchParams(window.location.search);
        let uri
        if (urlParams.has('uri')) {
            uri = decodeURI(urlParams.get('uri').replace(/["';><]/gi, ''));
            htmlTable(query.replace(/§/g, uri));
        }

        //***********************HTML Table download***************************************

        function htmlTable(qry){ 
            fetch('https://fuseki.geoinformation.dev/inspire-at/sparql?query=' + encodeURIComponent(qry) + '&format=json')
                    .then(res => res.json())
                    .then(jsonData => {console.log(jsonData);
                        let s = 'border: 1px solid black; border-collapse: collapse; word-wrap: break-all; padding:5px;';
                        let rows = jsonData.head.vars.filter(e => e !== 'title'); console.log(rows);
                        let tbl = `<table style="${s}" class="table table-hover">
                                        <thead>
                                        <tr style="${s}">
                                            <th style="${s}">${rows.join(`</th><th style="${s}">`)}</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        ${jsonData.results.bindings
                                            .map(a => `<tr style="${s}">` + 
                                            rows.map(c => `<td style="${s}${c=='Definition'||c=='scopeNote'?'font-size:70%;':''}">${a[c]==undefined?'':createLink(a[c].value)}</td>`).join() + '</tr>').join()}
                                        </tbody>
                                    </table>`;
                        document.getElementById('heading').innerHTML = `<h1>${jsonData.results.bindings[0].title.value}</h1><h3>URI: ${uri}</h3>`;
                        document.getElementById('table').innerHTML = tbl.replace(/,/g,'');

                    });
        }

        function createLink(txt){
            return txt.substring(0, 4) == 'http' ? '<a href="' + txt + '">' + txt + '</a>' : txt
        }

    </script>


</body>

</html>
